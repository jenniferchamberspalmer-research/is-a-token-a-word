name: Run probe batch

# Triggerable manually from the Actions tab on github.com (mobile-friendly).
# Checks out the development branch, runs harness.py against the deployed
# Modal endpoint, and commits the resulting JSON + CSV files back to that
# branch. The workflow file itself must live on the default branch so that
# GitHub Actions' workflow_dispatch trigger exposes the Run button.

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  WORK_BRANCH: claude/water-pattern-tool-QV5SH

jobs:
  run-probes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out development branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORK_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # gradio_client must match the gradio version baked into the
        # deployed Modal container (gradio==4.44.1, gradio-client==1.3.0).
        # An unpinned install pulls a newer client whose SSE protocol
        # the older server cannot speak — predict() crashes with
        # CancelledError from stream_sse_v1plus.
        run: pip install --quiet "gradio_client==1.3.0" "httpx<0.28" pandas

      - name: Run probe harness
        run: python harness.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data files to commit."
          else
            git commit -m "Probe data from workflow run #${{ github.run_number }}"
            git push origin HEAD:${{ env.WORK_BRANCH }}
          fi
