name: Run probe batch

# Triggerable manually from the Actions tab on github.com (mobile-friendly).
# Checks out the development branch, runs harness.py against the deployed
# Modal endpoint, and commits the resulting JSON + CSV files back to that
# branch. The workflow file itself must live on the default branch so that
# GitHub Actions' workflow_dispatch trigger exposes the Run button.

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  WORK_BRANCH: claude/water-pattern-tool-QV5SH

jobs:
  run-probes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out development branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORK_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Harness now calls the server's direct /probe REST endpoints,
        # so we only need httpx — no gradio_client involved.
        run: pip install --quiet httpx

      - name: Run probe harness
        run: python harness.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data files to commit."
          else
            git commit -m "Probe data from workflow run #${{ github.run_number }}"
            git push origin HEAD:${{ env.WORK_BRANCH }}
          fi
